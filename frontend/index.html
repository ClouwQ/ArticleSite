<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSOTB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Cactus Classical Serif', 'serif'],
            },
            colors: {
              accent: '#10b981', // Green accent from screenshot
              dark: '#111111',
              light: '#f4f1e9',
            },
            animation: {
              'slide-up': 'slideUp 0.3s ease-out forwards',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Gerbera font family */
      @font-face {
        font-family: 'Gerbera';
        src: url('/fonts/Gerbera-Light.woff2') format('woff2'),
             url('/fonts/Gerbera-Light.woff') format('woff'),
             url('/fonts/Gerbera-Light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Gerbera';
        src: url('/fonts/Gerbera.woff2') format('woff2'),
             url('/fonts/Gerbera.woff') format('woff'),
             url('/fonts/Gerbera.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Gerbera';
        src: url('/fonts/Gerbera-Medium.woff2') format('woff2'),
             url('/fonts/Gerbera-Medium.woff') format('woff'),
             url('/fonts/Gerbera-Medium.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Gerbera';
        src: url('/fonts/Gerbera-Bold.woff2') format('woff2'),
             url('/fonts/Gerbera-Bold.woff') format('woff'),
             url('/fonts/Gerbera-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Gerbera';
        src: url('/fonts/Gerbera-Black.woff2') format('woff2'),
             url('/fonts/Gerbera-Black.woff') format('woff'),
             url('/fonts/Gerbera-Black.ttf') format('truetype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      /* Hide scrollbar for carousel but allow functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }

      /* Disable text copying / selection on the public site */
      .no-copy,
      .no-copy * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      .no-copy img {
        -webkit-user-drag: none;
        user-drag: none;
      }

      /* Avoid the rubber-band overscroll that reveals the page background. */
      html, body {
        overscroll-behavior: none;
      }
      /* Smooth (eased) programmatic scrolling. */
      html {
        scroll-behavior: smooth;
      }

      /* Reading-view markdown. Headings sit slightly left of the body text. */
      .article-prose {
        font-family: 'Gerbera', sans-serif;
        line-height: 1.58;
        font-size: 1.0625rem;
        overflow-wrap: anywhere;
        word-break: break-word;
        padding-left: 1.5rem;
        max-width: 100%;
      }
      .article-prose > h1:first-child {
        display: none; /* title is shown in the header bar */
      }
      .article-prose h1,
      .article-prose h2,
      .article-prose h3,
      .article-prose h4 {
        margin-left: -1.5rem;
        font-weight: 700;
        line-height: 1.25;
      }
      .article-prose h1 { font-size: 1.55rem; margin-top: 1.8rem; margin-bottom: 0.8rem; }
      .article-prose h2 { font-size: 1.3rem; margin-top: 1.6rem; margin-bottom: 0.6rem; }
      .article-prose h3 { font-size: 1.12rem; margin-top: 1.2rem; margin-bottom: 0.5rem; }
      .article-prose h4 { font-size: 1.02rem; margin-top: 1rem; margin-bottom: 0.4rem; }
      .article-prose p { margin: 0 0 1rem; }
      .article-prose ul { list-style: disc; margin: 0 0 1rem 1.4rem; }
      .article-prose ol { list-style: decimal; margin: 0 0 1rem 1.4rem; }
      .article-prose li { margin: 0.25rem 0; }
      .article-prose strong { font-weight: 700; }
      .article-prose em { font-style: italic; }
      .article-prose img { max-width: 100%; height: auto; }
      .article-prose a { word-break: break-all; }
      .article-prose blockquote {
        border-left: 3px solid rgba(0, 0, 0, 0.2);
        padding-left: 1rem;
        margin: 1rem 0;
        font-style: italic;
        opacity: 0.85;
      }
      .article-prose code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(0, 0, 0, 0.06);
        padding: 0.1em 0.35em;
        border-radius: 4px;
      }
      .article-prose pre {
        overflow-x: auto;
        max-width: 100%;
        background: rgba(0, 0, 0, 0.06);
        padding: 1rem;
        border-radius: 8px;
        margin: 0 0 1rem;
      }
      .article-prose pre code { background: none; padding: 0; }
      .article-prose hr { border: none; border-top: 1px solid rgba(0, 0, 0, 0.15); margin: 1.5rem 0; }
      .article-prose table { display: block; overflow-x: auto; border-collapse: collapse; margin: 0 0 1rem; }
      .article-prose th,
      .article-prose td { border: 1px solid rgba(0, 0, 0, 0.15); padding: 0.4rem 0.6rem; }
      @media (max-width: 640px) {
        .article-prose { padding-left: 1rem; }
        .article-prose h1, .article-prose h2, .article-prose h3, .article-prose h4 { margin-left: -1rem; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

  }
}
</script>

</head>

</body>
</html>
